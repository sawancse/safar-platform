server:
  port: 8086
  tomcat:
    threads:
      max: 50
      min-spare: 5
    max-connections: 200
    accept-count: 50
    connection-timeout: 10000

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/safar?currentSchema=payments
    username: ${DB_USER:safar}
    password: ${DB_PASS:safar}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      idle-timeout: 30000
      connection-timeout: 10000
      leak-detection-threshold: 15000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        default_schema: payments
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    schemas: payments
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      max-poll-records: 100
      properties:
        fetch.max.bytes: 5242880
        max.partition.fetch.bytes: 1048576

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_SQHofxDdLYgOtm}
  key-secret: ${RAZORPAY_KEY_SECRET:SOpQRO4wMc5zs1QdufzdfRMW}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

stripe:
  enabled: false
  api-key: ${STRIPE_API_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

jwt:
  secret: ${JWT_SECRET:l0UNaBuoYCf7Y/G8G1bihPxkUI7NZuPaZdzTbbEYqzM=}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs.path: /api-docs
  swagger-ui.path: /swagger-ui.html
