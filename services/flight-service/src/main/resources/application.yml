server:
  port: 8094
  tomcat:
    threads:
      max: 50
      min-spare: 5
    max-connections: 200
    accept-count: 50
    connection-timeout: 10000

spring:
  application:
    name: flight-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/safar?currentSchema=flights}
    username: ${DB_USERNAME:safar}
    password: ${DB_PASSWORD:safar}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 10000
      leak-detection-threshold: 60000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: false
    properties:
      hibernate:
        default_schema: flights

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: flights
    schemas: flights

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 3000
        request.timeout.ms: 3000
        delivery.timeout.ms: 5000

jwt:
  secret: ${JWT_SECRET:l0UNaBuoYCf7Y/G8G1bihPxkUI7NZuPaZdzTbbEYqzM=}

flight:
  providers:
    primary: ${FLIGHT_PRIMARY_PROVIDER:DUFFEL}     # which adapter handles new bookings

amadeus:
  client-id: ${AMADEUS_CLIENT_ID:test_client_id}
  client-secret: ${AMADEUS_CLIENT_SECRET:test_client_secret}
  base-url: ${AMADEUS_BASE_URL:https://test.api.amadeus.com}
  # Production: https://api.amadeus.com  |  Test: https://test.api.amadeus.com

duffel:
  enabled: ${DUFFEL_ENABLED:true}
  access-token: ${DUFFEL_ACCESS_TOKEN:}            # blank → adapter reports !isEnabled, search returns no Duffel offers
  base-url: ${DUFFEL_BASE_URL:https://api.duffel.com}
  api-version: ${DUFFEL_API_VERSION:v2}
  payment-currency: ${DUFFEL_PAYMENT_CURRENCY:INR}
  webhook-secret: ${DUFFEL_WEBHOOK_SECRET:}        # blank → webhook accepts unsigned (dev only)

services:
  payment-service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8086}
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8092}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs.path: /api-docs
  swagger-ui.path: /swagger-ui.html
