server:
  port: 8083
  tomcat:
    threads:
      max: 10
      min-spare: 5
    max-connections: 200
    accept-count: 50
    connection-timeout: 10000

spring:
  application:
    name: listing-service
  datasource:
    url: jdbc:postgresql://localhost:5432/safar?currentSchema=listings
    username: ${DB_USER:safar}
    password: ${DB_PASS:safar}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 10000
      leak-detection-threshold: 15000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        default_schema: listings
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    schemas: listings
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 1MB
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: listing-service
      auto-offset-reset: earliest
      max-poll-records: 100
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        fetch.max.bytes: 5242880
        max.partition.fetch.bytes: 1048576

storage:
  local-mode: ${STORAGE_LOCAL_MODE:false}

aws:
  s3:
    bucket: ${S3_BUCKET:safar-media-dev}
    region: ${AWS_REGION:ap-south-1}
    # Leave access-key/secret-key blank to use the AWS default credential chain:
    # - Prod (ECS/Fargate): IAM task role — no keys in config
    # - Local dev: set AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY in .env,
    #   or rely on ~/.aws/credentials / `aws sso login`
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
  cloudfront:
    domain: ${CDN_DOMAIN:d1pei2hufbgxoj.cloudfront.net}

jwt:
  secret: ${JWT_SECRET:l0UNaBuoYCf7Y/G8G1bihPxkUI7NZuPaZdzTbbEYqzM=}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,mappings

services:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8092}
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8090}

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      aiService:
        base-config: default
      userService:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
    instances:
      aiService:
        base-config: default
      userService:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true

springdoc:
  api-docs.path: /api-docs
  swagger-ui.path: /swagger-ui.html
