server:
  port: 8080
  netty:
    connection-timeout: 10000

spring:
  application:
    name: api-gateway

  codec:
    max-in-memory-size: 20MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 2000ms

  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 15s
      # CORS handled by CorsConfig.java bean (highest precedence)

      routes:
        # ── OTP send: rate-limited to 3 req/hour per IP ──────────────────────
        - id: auth-otp-send
          uri: ${AUTH_SERVICE_URL:http://localhost:8888}
          predicates:
            - Path=/api/v1/auth/otp/send
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # ── All other auth routes (verify, refresh, logout) ──────────────────
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8888}
          predicates:
            - Path=/api/v1/auth/**

        # ── User profiles & subscriptions ────────────────────────────────────
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8092}
          predicates:
            - Path=/api/v1/users/**

        # ── Listings (GET public, mutations need JWT) ─────────────────────────
        - id: listing-service
          uri: ${LISTING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/listings/**

        # ── Location suggestions (public autocomplete) ────────────────────────
        - id: locations
          uri: ${LISTING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/locations/**

        # ── Search (all GET endpoints are public) ─────────────────────────────
        - id: search-service
          uri: ${SEARCH_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/search/**

        # ── Bookings ──────────────────────────────────────────────────────────
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8095}
          predicates:
            - Path=/api/v1/bookings/**

        # ── Payments — webhook first (no JWT), then authenticated routes ──────
        - id: payment-service-webhook
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/payments/webhook/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/payments/**

        # ── Donations (Aashray) ───────────────────────────────────────────────
        - id: donation-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/donations/**

        # ── Media uploads ─────────────────────────────────────────────────────
        - id: media-service
          uri: ${MEDIA_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/media/**

        # ── Reviews ───────────────────────────────────────────────────────────
        - id: review-service
          uri: ${REVIEW_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/reviews/**

        # ── Messaging ────────────────────────────────────────────────────────
        - id: messaging-service
          uri: ${MESSAGING_SERVICE_URL:http://localhost:8091}
          predicates:
            - Path=/api/v1/messages/**

        # ── Guest subscriptions (S18) ───────────────────────────────────────
        - id: guest-service
