spring:
  datasource:
    url: jdbc:h2:mem:safar_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: auth
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LW11c3QtYmUtMjU2LWJpdHMtbG9uZy1mb3ItdGVzdGluZw==
  expiry-minutes: 15
  refresh-expiry-days: 30

otp:
  expiry-minutes: 10
