<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body style="margin:0;padding:0;background:#F7F7F7;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#F7F7F7;padding:24px 0;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
  <!-- Header -->
  <tr><td style="background:linear-gradient(135deg,#1a1a2e,#16213e);padding:24px;text-align:center;">
    <span style="font-family:Georgia,serif;font-style:italic;font-size:28px;color:#FF5A5F;font-weight:bold;">S</span>
    <span style="font-family:Georgia,serif;font-size:28px;color:#FF5A5F;">afar</span>
  </td></tr>
  <!-- Hero -->
  <tr><td style="background:linear-gradient(135deg,#27ae60,#2ecc71);padding:36px 24px;text-align:center;">
    <div style="font-size:28px;color:#fff;font-weight:bold;">&#x1F4C9; Price Dropped!</div>
    <div style="color:rgba(255,255,255,0.9);margin-top:8px;font-size:15px;">A stay you viewed just got cheaper</div>
  </td></tr>
  <!-- Body -->
  <tr><td style="padding:32px 36px;">
    <p style="font-size:16px;color:#333;margin:0 0 16px;">Hi <span th:text="${ctx.guestName}">Guest</span>,</p>
    <p style="font-size:15px;color:#555;line-height:1.6;margin:0 0 20px;">
      Great news! A property you were interested in just dropped its price.
    </p>
    <!-- Listing Card -->
    <div style="border:1px solid #eee;border-radius:10px;padding:24px;margin:0 0 24px;">
      <div style="font-size:18px;font-weight:bold;color:#333;" th:text="${ctx.listingTitle}">Beautiful Hilltop Villa</div>
      <div style="margin-top:12px;">
        <span style="font-size:24px;font-weight:bold;color:#27ae60;" th:text="${ctx.totalAmount}">&#x20B9;3,499</span>
        <span style="font-size:13px;color:#888;margin-left:4px;">per night</span>
      </div>
      <div style="font-size:13px;color:#888;margin-top:8px;">Book now before the price goes back up!</div>
    </div>
    <div style="text-align:center;margin:28px 0;">
      <a href="https://ysafar.com" style="background:#FF5A5F;color:#fff;padding:14px 36px;border-radius:8px;text-decoration:none;font-size:16px;font-weight:bold;display:inline-block;">View Listing</a>
    </div>
  </td></tr>
  <!-- Footer -->
  <tr><td style="background:#f9f9f9;padding:20px 36px;text-align:center;border-top:1px solid #eee;">
    <p style="font-size:12px;color:#999;margin:0;">Safar Technologies Pvt. Ltd. | Hyderabad, India</p>
    <p style="font-size:12px;color:#999;margin:6px 0 0;">
      <a href="https://ysafar.com" style="color:#FF5A5F;text-decoration:none;">ysafar.com</a>
    </p>
  </td></tr>
</table>
</td></tr>
</table>
</body>
</html>
