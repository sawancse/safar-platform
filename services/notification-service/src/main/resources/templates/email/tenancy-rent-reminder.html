<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rent Reminder</title>
    <style>
        body { margin: 0; padding: 0; width: 100% !important; background-color: #F7F7F7; }
        @media only screen and (max-width: 620px) { .email-container { width: 100% !important; } .mobile-padding { padding-left: 16px !important; padding-right: 16px !important; } }
    </style>
</head>
<body style="margin:0; padding:0; background-color:#F7F7F7; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color:#F7F7F7;">
        <tr><td align="center" style="padding:20px 0;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" class="email-container" style="max-width:600px; background-color:#FFFFFF; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.08);">
                <tr>
                    <td style="background:linear-gradient(135deg,#FF5A5F 0%,#FF385C 100%); padding:28px 40px;" class="mobile-padding">
                        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"><tr>
                            <td style="font-family:'Georgia','Times New Roman',serif; font-size:32px; font-weight:bold; color:#FFFFFF;"><span style="font-style:italic;">S</span>afar</td>
                            <td align="right" style="font-size:13px; color:rgba(255,255,255,0.9);" th:text="'Hi, ' + ${ctx.guestName}">Hi, Tenant</td>
                        </tr></table>
                    </td>
                </tr>

                <tr>
                    <td style="padding:32px 40px 16px;" class="mobile-padding">
                        <div style="background:#FFF3E0; border-radius:8px; padding:16px; text-align:center;">
                            <p style="margin:0; font-size:14px; color:#E65100; font-weight:600;">
                                Rent Due in <span th:text="${ctx.daysUntilDue}">5</span> Days
                            </p>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td style="padding:16px 40px;" class="mobile-padding">
                        <p style="margin:0 0 16px; font-size:14px; color:#484848; line-height:1.6;">
                            This is a friendly reminder that your monthly rent is due soon.
                        </p>
                        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="border:1px solid #E8E8E8; border-radius:8px;">
                            <tr>
                                <td style="padding:12px 16px; border-bottom:1px solid #F0F0F0; font-size:13px; color:#767676;">Invoice</td>
                                <td style="padding:12px 16px; border-bottom:1px solid #F0F0F0; font-size:14px; color:#2D2D2D;" align="right" th:text="${ctx.invoiceNumber}">INV-PG-2026-1001</td>
                            </tr>
                            <tr>
                                <td style="padding:12px 16px; border-bottom:1px solid #F0F0F0; font-size:13px; color:#767676;">Amount</td>
                                <td style="padding:12px 16px; border-bottom:1px solid #F0F0F0; font-size:16px; color:#2D2D2D; font-weight:600;" align="right" th:text="${ctx.rentAmount}">&#8377;8,000</td>
                            </tr>
                            <tr>
                                <td style="padding:12px 16px; font-size:13px; color:#767676;">Due Date</td>
                                <td style="padding:12px 16px; font-size:14px; color:#E65100; font-weight:600;" align="right" th:text="${ctx.dueDate}">01 May 2026</td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <tr>
                    <td style="padding:24px 40px 32px;" class="mobile-padding" align="center">
                        <a href="https://ysafar.com/pg-dashboard" style="display:inline-block; background:#FF385C; color:#FFFFFF; padding:14px 32px; border-radius:8px; text-decoration:none; font-size:15px; font-weight:600;">Pay Now</a>
                    </td>
                </tr>

                <tr>
                    <td style="background-color:#F7F7F7; padding:24px 40px; border-top:1px solid #E8E8E8;" class="mobile-padding">
                        <p style="margin:0; font-size:12px; color:#767676; text-align:center;">Tip: Set up auto-debit from your PG Dashboard to never miss a payment.</p>
                    </td>
                </tr>
            </table>
        </td></tr>
    </table>
</body>
</html>
