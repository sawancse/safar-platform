server:
  port: 8089

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:safar}?currentSchema=notifications
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: notifications
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    schemas: notifications
    default-schema: notifications

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      max-poll-records: 20
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        fetch.max.bytes: 5242880
        max.partition.fetch.bytes: 1048576

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:${MAIL_USERNAME:sawank.sit@gmail.com}}
    password: ${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:tkmzezdqrcwxngdu}}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true

notification:
  from-email: ${NOTIFICATION_FROM_EMAIL:sawank.sit@gmail.com}
  from-name: Safar
  # Production: use https://ysafar.com poll record 100
  base-url: ${NOTIFICATION_BASE_URL:http://localhost:3000}

services:
  booking-service:
    url: ${BOOKING_SERVICE_URL:http://localhost:8095}
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8092}

# MSG91 SMS configuration (transactional SMS for rent reminders)
msg91:
  auth-key: ${MSG91_AUTH_KEY:}
  sender-id: ${MSG91_SENDER_ID:SAFAR}
  base-url: https://control.msg91.com/api/v5
  sms:
    rent-advance-template-id: ${MSG91_SMS_RENT_ADVANCE_TEMPLATE:}
    rent-reminder-template-id: ${MSG91_SMS_RENT_REMINDER_TEMPLATE:}
    rent-urgent-template-id: ${MSG91_SMS_RENT_URGENT_TEMPLATE:}
    rent-overdue-template-id: ${MSG91_SMS_RENT_OVERDUE_TEMPLATE:}
    invoice-template-id: ${MSG91_SMS_INVOICE_TEMPLATE:}

jwt:
  secret: ${JWT_SECRET:l0UNaBuoYCf7Y/G8G1bihPxkUI7NZuPaZdzTbbEYqzM=}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      bookingService:
        base-config: default
      userService:
        base-config: default
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
    instances:
      bookingService:
        base-config: default
      userService:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true

springdoc:
  api-docs.path: /api-docs
  swagger-ui.path: /swagger-ui.html
